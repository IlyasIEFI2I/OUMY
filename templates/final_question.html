<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Question Importante ❤️</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="background-gradient"></div>

    <!-- Cœurs flottants -->
    <div class="hearts-container">
        <div class="heart floating" style="left: 10%; animation-delay: 0s;"></div>
        <div class="heart floating" style="left: 30%; animation-delay: 2s;"></div>
        <div class="heart floating" style="left: 70%; animation-delay: 0.5s;"></div>
        <div class="heart floating" style="left: 90%; animation-delay: 2.5s;"></div>
    </div>

    <div class="container">
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%;"></div>
            </div>
            <p class="progress-text">Question finale</p>
        </div>

        <div class="final-question-container">
            <!-- Premier message -->
            <div class="fade-in-text final-text-1">
                <h2 class="final-title">OUMI ZOUMI ❤️</h2>
            </div>

            <!-- La question finale -->
            <div class="fade-in-text final-text-2">
                <h1 class="final-question">Wach bghiti twelli ma copine ? 💍❤️</h1>
            </div>

            <!-- Réponses (uniquement Oui) -->
            <form id="finalForm" method="POST" action="/final-answer" class="fade-in-text final-text-3">
                <div class="final-answers-grid">
                    <label class="final-answer-option">
                        <input type="radio" name="answer" value="❤️ Oui" required>
                        <span class="final-answer-label">❤️ Oui</span>
                    </label>
                    <label class="final-answer-option">
                        <input type="radio" name="answer" value="🥰 Bien sûr" required>
                        <span class="final-answer-label">🥰 Bien sûr</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-final">
                    <span class="btn-text">Répondre ❤️</span>
                </button>
            </form>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const texts = document.querySelectorAll('.fade-in-text');
            texts.forEach((text, index) => {
                text.style.animationDelay = (index * 0.7) + 's';
            });

            const form = document.getElementById('finalForm');
            const answerOptions = document.querySelectorAll('.final-answer-option');

            answerOptions.forEach(option => {
                option.addEventListener('change', function() {
                    answerOptions.forEach(opt => opt.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });

            form.addEventListener('submit', function(e) {
                e.preventDefault();

                const selectedAnswer = form.querySelector('input[name="answer"]:checked');
                if (!selectedAnswer) {
                    return;
                }

                // Déclencher les confettis
                createConfetti();

                // Soumettre après un délai
                setTimeout(() => {
                    form.submit();
                }, 1000);
            });
        });

        function createConfetti() {
            const confetti = document.createElement('canvas');
            confetti.id = 'confetti-canvas';
            confetti.width = window.innerWidth;
            confetti.height = window.innerHeight;
            document.body.appendChild(confetti);

            const ctx = confetti.getContext('2d');
            const particles = [];

            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * confetti.width,
                    y: -10,
                    vx: (Math.random() - 0.5) * 8,
                    vy: Math.random() * 5 + 3,
                    angle: Math.random() * Math.PI * 2,
                    size: Math.random() * 8 + 4,
                    color: ['#FF6B9D', '#FF8FA3', '#FFABAF', '#FFB3C1', '#FFC3D0'][Math.floor(Math.random() * 5)],
                    life: 1,
                });
            }

            function animate() {
                ctx.clearRect(0, 0, confetti.width, confetti.height);

                particles.forEach(p => {
                    p.y += p.vy;
                    p.x += p.vx;
                    p.life -= 0.01;
                    p.vy += 0.1;

                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });

                if (particles.some(p => p.life > 0)) {
                    requestAnimationFrame(animate);
                } else {
                    confetti.remove();
                }
            }

            animate();
        }
    </script>
</body>
</html>
